<!DOCTYPE html>
<html>
    <head>
        <title>My Title</title>
        <style>

            .container {
    margin: auto;
    width: 1200px;
}

h1 {
    text-align: center;
}

p.main-section-para {
    text-align: center;
}

.box {
    width: 300px;
    background-color: rgba(65, 68, 68, 0.568);
    margin: auto;
    padding: 20px;
    border-radius: 10px;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background-color: #939595;
    border-radius: 10px;
    align-items: center;
}

ul.menu-list-set {
    display: flex;
    justify-content: space-between;
    list-style: none;
    padding: 10px;
    margin: 1px;
}hg

ul.menu-list-set li {
    padding: 20px;
}

.menu-btn {
    background-color: white;
    padding: 10px;
    border-radius: 10px;
}

section.Main-Section {
    display: flex;
    align-items: center;
    padding: 20px;
    justify-content: center !important;
}

        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <div class="logo">
                    <img src="IMG/Dextox logo.png">
                </div>
                <div class="menu-set">
                    <ul class="menu-list-set">
                        <li>Home</li>
                        <li>About Us</li>
                        <li>Contact Us</li>
                    </ul>
                </div>
                <div class="menu-btn">
                    <a href="https://dextox.in/">Visit</a>
                </div>
            </div>
            <div>
                <h1>This is Heading</h1>
                <p class="main-section-para">This is paragraph</p>
            </div>
            <div class="box">
                <img src="IMG/Dextox logo.png" width="250px">
                <h2>This is heading</h2>
                <p>This is Paragraph.</p>
            </div>
        </div>
    </body>
</html>
