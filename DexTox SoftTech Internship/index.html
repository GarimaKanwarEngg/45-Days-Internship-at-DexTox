<!DOCTYPE html>
<html>
<head>
<title>First Web page</title>
<style>
    .Container {
    width: 800px;
    margin: 0 auto;
}
.logoset {
    width: 100px;
}
ul.Menu-set {
    list-style: none;
    display: flex;
}

ul.Menu-set li {
    padding: 10px;
}
.Header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: lightblue;
    padding: 0px 10px 0 10px;
    border-radius: 10px;
}
a.Btn-class {
    color: white;
    text-decoration: none;
    background-color: #3174f1;
    padding: 10px;
    margin: 10px;
    border-radius: 10px 10px 10px 0;
}


</style>
</head>
<body>
<div class="Container">
 <div class = "Header">
    <div>
        <img src="IMG/google.png" class="logoset">
    </div>
    <div class="Menu">
        <ul class="Menu-set">
            <li>Home</li>
            <li>About</li>
            <li>Gallary</li>
            <li>Contact</li>
        </ul>
    </div>
    <div class="Button">
        <a href="#" class="Btn-class">Login</a>
    </div>
 </div>




<div class="Box">
<h1>This is a Heading</h1>
<p>This is a paragraph.</p>
</div>
</div>
</body>
</html>
